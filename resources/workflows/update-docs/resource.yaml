id: update-docs
kind: workflow
status: active
description: Orquestación de actualización de documentación para recursos.
steps:
  - id: readme_update
    intent: "Actualizar el archivo README principal del recurso"
    associations:
      - tool: resources-repo-manager
        strength: 1.0
  - id: registry_sync
    intent: "Sincronizar el registro global de recursos"
    associations:
      - tool: resources-repo-manager
        strength: 1.0
