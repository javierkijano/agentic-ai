id: add-skill
kind: workflow
status: active
description: Proceso completo de creación y registro de una nueva skill.
steps:
  - id: check_naming_convention
    intent: "Validar que el nombre sigue la convención del canon"
    associations:
      - tool: resources-repo-manager
        strength: 1.0
  - id: create_structure
    intent: "Crear la estructura de carpetas y archivos base"
    associations:
      - tool: resources-repo-manager
        strength: 1.0
  - id: finalize_docs
    intent: "Asegurar que toda la documentación técnica esté completa"
    associations:
      - workflow: update-docs
        strength: 1.0
